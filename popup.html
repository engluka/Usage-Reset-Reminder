<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 16px;
    }

    h1 {
      font-size: 14px;
      font-weight: 600;
      color: #d4a574;
      margin-bottom: 14px;
      text-align: center;
      letter-spacing: 0.3px;
    }

    .section {
      background: #16213e;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 10px;
    }

    .section:last-of-type {
      margin-bottom: 0;
    }

    .section-title {
      font-size: 11px;
      font-weight: 600;
      color: #d4a574;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    .section-title.allmodels {
      color: #7c9dea;
    }

    .status {
      text-align: center;
      padding: 10px 0;
      color: #666;
      font-size: 12px;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 5px 0;
      border-bottom: 1px solid #1e2d50;
      font-size: 12px;
    }

    .info-row:last-of-type {
      border-bottom: none;
    }

    .label {
      color: #999;
    }

    .value {
      color: #fff;
      font-weight: 500;
      font-variant-numeric: tabular-nums;
    }

    .countdown {
      text-align: center;
      font-size: 24px;
      font-weight: 700;
      color: #d4a574;
      padding: 10px 0 4px;
      font-variant-numeric: tabular-nums;
      letter-spacing: 1px;
    }

    .countdown.allmodels {
      color: #7c9dea;
    }

    .countdown-label {
      text-align: center;
      font-size: 10px;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 1px;
      padding-bottom: 8px;
    }

    .ready {
      color: #4ade80 !important;
    }
  </style>
</head>
<body>
  <h1>Claude Reset Reminder</h1>

  <!-- Session (5 hours) -->
  <div class="section">
    <div class="section-title">Session (5 hours)</div>
    <div id="session-no" class="status">No active session</div>
    <div id="session-info" style="display:none;">
      <div class="countdown" id="session-countdown">--:--:--</div>
      <div class="countdown-label" id="session-countdown-label">until reset</div>
      <div class="info-row">
        <span class="label">Started</span>
        <span class="value" id="session-start">--</span>
      </div>
      <div class="info-row">
        <span class="label">Resets at</span>
        <span class="value" id="session-reset">--</span>
      </div>
    </div>
  </div>

  <!-- All Models (7 days) -->
  <div class="section">
    <div class="section-title allmodels">All Models (7 days)</div>
    <div id="allmodels-no" class="status">No active window</div>
    <div id="allmodels-info" style="display:none;">
      <div class="countdown allmodels" id="allmodels-countdown">--:--:--</div>
      <div class="countdown-label" id="allmodels-countdown-label">until reset</div>
      <div class="info-row">
        <span class="label">Started</span>
        <span class="value" id="allmodels-start">--</span>
      </div>
      <div class="info-row">
        <span class="label">Resets at</span>
        <span class="value" id="allmodels-reset">--</span>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
